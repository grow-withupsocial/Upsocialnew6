<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - UpSocial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body { 
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
            background: #ffffff; 
            color: #0a0e27;
            padding-bottom: 150px;
            display: flex;
            flex-direction: column;
        }
        
        /* Header */
        .header {
            background: white;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #f0f2f5;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        
        .header-back {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #f5f7fa;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: 0.3s;
        }
        
        .header-back:hover {
            background: #e8eef7;
        }
        
        .header-title {
            font-size: 18px;
            font-weight: 700;
            color: #0a0e27;
        }
        
        /* Main Content */
        main { 
            flex: 1;
            padding: 16px;
            max-width: 100%;
        }
        
        /* Filters */
        .filters {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .filter-btn {
            padding: 10px 14px;
            border-radius: 8px;
            border: 1.5px solid #e8eef7;
            background: white;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: 0.3s;
            font-family: 'Outfit', sans-serif;
            color: #8892a8;
        }
        
        .filter-btn.active {
            background: linear-gradient(135deg, #3CB371 0%, #2d9a5f 100%);
            color: white;
            border-color: #3CB371;
        }
        
        .filter-btn:hover {
            border-color: #3CB371;
            color: #3CB371;
        }
        
        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            text-align: center;
        }
        
        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        .empty-title {
            font-size: 16px;
            font-weight: 700;
            color: #0a0e27;
            margin-bottom: 8px;
        }
        
        .empty-text {
            font-size: 13px;
            color: #8892a8;
            letter-spacing: 0.3px;
            margin-bottom: 20px;
        }
        
        .empty-btn {
            background: linear-gradient(135deg, #3CB371 0%, #2d9a5f 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        
        .empty-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(60, 179, 113, 0.2);
        }
        
        /* Orders List */
        .orders-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .order-card {
            background: white;
            border-radius: 14px;
            border: 1.5px solid #f0f2f5;
            padding: 16px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
        }
        
        .order-card:hover {
            border-color: #3CB371;
            box-shadow: 0 4px 16px rgba(60, 179, 113, 0.1);
        }
        
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        
        .order-id {
            font-size: 13px;
            font-weight: 700;
            color: #0a0e27;
            letter-spacing: -0.3px;
        }
        
        .order-status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.2px;
        }
        
        .status-processing {
            background: #dbeafe;
            color: #0c2340;
        }
        
        .status-pending {
            background: #fca5a5;
            color: #7f1d1d;
        }
        
        .status-in_progress {
            background: #fde047;
            color: #78350f;
        }
        
        .status-completed {
            background: #d1fae5;
            color: #065f46;
        }
        
        .status-cancelled {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .order-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .info-item {
            font-size: 12px;
        }
        
        .info-label {
            color: #8892a8;
            margin-bottom: 2px;
            font-weight: 500;
        }
        
        .info-value {
            color: #0a0e27;
            font-weight: 600;
        }
        
        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid #f0f2f5;
        }
        
        .order-date {
            font-size: 11px;
            color: #c5cad4;
        }
        
        .order-price {
            font-size: 14px;
            font-weight: 700;
            color: #3CB371;
        }
        
        /* Order Detail Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 14, 39, 0.6);
            backdrop-filter: blur(4px);
            align-items: flex-end;
            z-index: 200;
            animation: slideUp 0.3s ease-out;
        }
        
        @keyframes slideUp {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 24px 24px 0 0;
            padding: 28px 20px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            animation: modalSlideUp 0.3s ease-out;
        }
        
        @keyframes modalSlideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .modal-title {
            font-size: 20px;
            font-weight: 700;
            color: #0a0e27;
            letter-spacing: -0.5px;
        }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            color: #c5cad4;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        
        .modal-close:hover {
            color: #0a0e27;
        }
        
        .detail-section {
            margin-bottom: 24px;
        }
        
        .detail-title {
            font-size: 13px;
            font-weight: 700;
            color: #0a0e27;
            margin-bottom: 12px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f0f2f5;
            font-size: 13px;
        }
        
        .detail-row:last-child {
            border-bottom: none;
        }
        
        .detail-label {
            color: #8892a8;
            font-weight: 500;
        }
        
        .detail-value {
            color: #0a0e27;
            font-weight: 600;
        }
        
        .detail-card {
            background: #f5f7fa;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 12px;
        }
        
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 24px;
        }
        
        .btn {
            padding: 13px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Outfit', sans-serif;
            letter-spacing: 0.3px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3CB371 0%, #2d9a5f 100%);
            color: white;
            box-shadow: 0 4px 16px rgba(60, 179, 113, 0.2);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(60, 179, 113, 0.3);
        }
        
        .btn-secondary {
            background: #f5f7fa;
            color: #0a0e27;
            border: 1.5px solid #e8eef7;
        }
        
        .btn-secondary:hover {
            background: #e8eef7;
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        /* Bottom Navigation */
        .bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    height:78px;
    background:#fff;
    display:flex;
    justify-content:space-around;
    align-items:center;
    border-top:1px solid #f1f1f1;
    box-shadow:0 -8px 30px rgba(0,0,0,.05);
    z-index:1000;
}

.nav-item{
    text-decoration:none;
    color:#9CA3AF;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:5px;
    font-size:11px;
    font-weight:500;
    transition:.3s;
}

.nav-item i{
    font-size:20px;
}

.nav-item.active{
    color:#3CB371;
}

.nav-item.active i{
    background:rgba(60,179,113,.12);
    width:42px;
    height:42px;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.nav-item span{
    font-size:11px;
}
        
        @media (max-width: 600px) {
            main { padding: 12px; }
            .filters { grid-template-columns: 1fr 1fr; }
            .order-info { grid-template-columns: 1fr 1fr; }
            .action-buttons { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <button class="header-back" onclick="goBack()">←</button>
        <h1 class="header-title">My Orders</h1>
    </div>

    <!-- Main Content -->
    <main>
        <!-- Filters -->
        <div class="filters">
            <button class="filter-btn active" onclick="filterOrders('all')">All</button>
            <button class="filter-btn" onclick="filterOrders('pending')">Pending</button>
            <button class="filter-btn" onclick="filterOrders('processing')">Processing</button>
            <button class="filter-btn" onclick="filterOrders('in_progress')">In Progress</button>
        </div>

        <!-- Orders List -->
        <div id="ordersList"></div>

        <!-- Empty State -->
        <div id="emptyState" style="display: none;">
            <div class="empty-state">
                <div class="empty-icon">📭</div>
                <div class="empty-title">No Orders Yet</div>
                <div class="empty-text">You haven't placed any orders yet. Start by browsing our services.</div>
                <a href="new-order.html" class="empty-btn">
                    <i class="fas fa-plus"></i> Place Order
                </a>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="Dashboard.html" class="nav-item">
            <i class="fas fa-house"></i>
            <span>Home</span>
        </a>
        <a href="my-orders.html" class="nav-item active">
            <i class="fas fa-layer-group"></i>
            <span>Orders</span>
        </a>
        <a href="new-order.html" class="nav-item">
            <i class="fas fa-bag-shopping"></i>
            <span>New-Orders</span>
        </a>
        <a href="profile.html" class="nav-item">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </a>
    </div>

    <!-- Order Detail Modal -->
    <div class="modal" id="orderModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">Order Details</div>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>

            <div class="detail-section">
                <div class="detail-title">Service Information</div>
                <div class="detail-row">
                    <span class="detail-label">Service</span>
                    <span class="detail-value" id="detailService">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Platform</span>
                    <span class="detail-value" id="detailPlatform">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Target</span>
                    <span class="detail-value" id="detailTarget">-</span>
                </div>
            </div>

            <div class="detail-section">
                <div class="detail-title">Order Details</div>
                <div class="detail-row">
                    <span class="detail-label">Order ID</span>
                    <span class="detail-value" id="detailId">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Quantity</span>
                    <span class="detail-value" id="detailQuantity">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Price</span>
                    <span class="detail-value" id="detailPrice">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Status</span>
                    <span class="detail-value" id="detailStatus">-</span>
                </div>
            </div>

            <div class="detail-section">
                <div class="detail-title">Timeline</div>
                <div class="detail-row">
                    <span class="detail-label">Ordered On</span>
                    <span class="detail-value" id="detailDate">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Time</span>
                    <span class="detail-value" id="detailTime">-</span>
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn btn-secondary" onclick="closeModal()">Close</button>
                <button class="btn btn-primary" onclick="copyOrderId()">Copy ID</button>
            </div>
        </div>
    </div>

    <script>
        let allOrders = [];
        let currentFilter = 'all';
        let selectedOrder = null;

        // Initialize
        window.addEventListener('load', function() {
            checkLogin();
            loadOrders();
        });

        function checkLogin() {
            const isLoggedIn = localStorage.getItem('upsocial_loggedIn');
            if (!isLoggedIn || isLoggedIn === 'false') {
                window.location.href = 'login.html';
                return;
            }
        }

        function loadOrders() {
            const userEmail = localStorage.getItem('upsocial_currentUser');
            const ordersData = localStorage.getItem('upsocial_userOrders_' + userEmail);
            
            if (!ordersData) {
                allOrders = [];
            } else {
                allOrders = JSON.parse(ordersData);
            }

            renderOrders();
        }

        function filterOrders(filter) {
            currentFilter = filter;
            
            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            renderOrders();
        }

        function getFilteredOrders() {
            if (currentFilter === 'all') {
                return allOrders;
            }
            return allOrders.filter(order => order.status === currentFilter);
        }

        function renderOrders() {
            const filtered = getFilteredOrders();
            const ordersList = document.getElementById('ordersList');
            const emptyState = document.getElementById('emptyState');

            if (!filtered || filtered.length === 0) {
                ordersList.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            
            ordersList.innerHTML = filtered.map(order => `
                <div class="order-card" onclick="openOrderDetail(${filtered.indexOf(order)})">
                    <div class="order-header">
                        <div class="order-id">${order.id}</div>
                        <div class="order-status status-${order.status}">
                            ${capitalizeStatus(order.status)}
                        </div>
                    </div>
                    
                    <div class="order-info">
                        <div class="info-item">
                            <div class="info-label">Service</div>
                            <div class="info-value">${order.service}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Platform</div>
                            <div class="info-value">${order.platform}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Quantity</div>
                            <div class="info-value">${order.quantity}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Target</div>
                            <div class="info-value">${truncateText(order.target, 20)}</div>
                        </div>
                    </div>

                    <div class="order-footer">
                        <div class="order-date">${order.date} ${order.time || ''}</div>
                        <div class="order-price">₦${order.price.toFixed(2)}</div>
                    </div>
                </div>
            `).join('');
        }

        function capitalizeStatus(status) {
            const capitalize = (str) => str.charAt(0).toUpperCase() + str.slice(1);
            return capitalize(status);
        }

        function truncateText(text, length) {
            return text.length > length ? text.substring(0, length) + '...' : text;
        }

        function openOrderDetail(index) {
            const filtered = getFilteredOrders();
            selectedOrder = filtered[index];
            
            if (!selectedOrder) return;

            document.getElementById('modalTitle').textContent = 'Order: ' + selectedOrder.id;
            document.getElementById('detailService').textContent = selectedOrder.service || '-';
            document.getElementById('detailPlatform').textContent = selectedOrder.platform || '-';
            document.getElementById('detailTarget').textContent = selectedOrder.target || '-';
            document.getElementById('detailId').textContent = selectedOrder.id;
            document.getElementById('detailQuantity').textContent = selectedOrder.quantity || '-';
            document.getElementById('detailPrice').textContent = '₦' + (selectedOrder.price || 0).toFixed(2);
            document.getElementById('detailStatus').textContent = capitalizeStatus(selectedOrder.status || 'unknown');
            document.getElementById('detailDate').textContent = selectedOrder.date || '-';
            document.getElementById('detailTime').textContent = selectedOrder.time || '-';

            document.getElementById('orderModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('orderModal').classList.remove('active');
            selectedOrder = null;
        }

        function copyOrderId() {
            if (!selectedOrder) return;
            
            const text = selectedOrder.id;
            navigator.clipboard.writeText(text).then(() => {
                alert('✅ Order ID copied to clipboard!');
            }).catch(() => {
                alert('Failed to copy');
            });
        }

        function goBack() {
            window.history.back();
        }

        // Close modal on outside click
        document.getElementById('orderModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
