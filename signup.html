<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - UpSocial</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1b5c2c 0%, #2d9a5f 50%, #3CB371 100%); min-height: 100vh; display: flex; flex-direction: column; position: relative; overflow-x: hidden; }
        
        /* Wave Divider */
        .wave-divider { position: absolute; bottom: 200px; left: 0; right: 0; height: 80px; background: linear-gradient(90deg, #fbbf24 0%, #fcd34d 100%); clip-path: polygon(0 40%, 0% 60%, 5% 58%, 10% 62%, 15% 58%, 20% 62%, 25% 58%, 30% 62%, 35% 58%, 40% 62%, 45% 58%, 50% 62%, 55% 58%, 60% 62%, 65% 58%, 70% 62%, 75% 58%, 80% 62%, 85% 58%, 90% 62%, 95% 58%, 100% 62%, 100% 100%, 0 100%); }
        
        .logo { font-size: 20px; font-weight: 700; color: white; padding: 20px; text-align: center; }
        .logo .highlight { color: #fbbf24; }
        
        /* Auth Container */
        .auth-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; z-index: 10; }
        
        .auth-card { background: white; border-radius: 12px; padding: 40px; max-width: 500px; width: 100%; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2); }
        
        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header .icon { width: 50px; height: 50px; background: #3CB371; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; margin: 0 auto 15px; }
        .auth-header h1 { font-size: 24px; margin-bottom: 5px; font-weight: 700; }
        .auth-header p { font-size: 14px; color: #3CB371; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 13px; color: #1a1a1a; }
        input, select { width: 100%; padding: 12px; border: 1px solid #e5e7eb; border-radius: 6px; font-size: 14px; transition: 0.3s; background: #f9fafb; }
        input:focus, select:focus { outline: none; border-color: #3CB371; background: white; box-shadow: 0 0 0 3px rgba(60, 179, 113, 0.1); }
        
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .checkbox-group { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; font-size: 13px; }
        .checkbox-group input[type="checkbox"] { width: auto; margin: 0; }
        .checkbox-group label { margin: 0; font-weight: normal; }
        .checkbox-group a { color: #3CB371; text-decoration: none; }
        
        .btn { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 14px; width: 100%; transition: 0.3s; }
        .btn-primary { background: #3CB371; color: white; margin-top: 10px; }
        .btn-primary:hover { background: #2d9a5f; }
        
        .divider { margin: 20px 0; position: relative; text-align: center; }
        .divider-line { height: 1px; background: #e5e7eb; }
        .divider-text { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); background: white; padding: 0 10px; color: #999; font-size: 12px; font-weight: 600; }
        
        .social-btn { width: 100%; padding: 12px; border: 1px solid #e5e7eb; border-radius: 6px; background: white; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .social-btn:hover { border-color: #3CB371; background: #f9fafb; }
        
        .auth-link { text-align: center; margin-top: 20px; font-size: 13px; }
        .auth-link a { color: #3CB371; text-decoration: none; font-weight: 600; }
        .auth-link a:hover { text-decoration: underline; }
        
        @media (max-width: 768px) {
            .auth-card { padding: 30px 20px; }
            .auth-header h1 { font-size: 20px; }
            .form-row { grid-template-columns: 1fr; }
            .wave-divider { bottom: 150px; }
        }
    </style>
</head>
<body>
    <!-- Wave Divider -->
    <div class="wave-divider"></div>

    <!-- Logo -->
    <div class="logo">
        <div id="logoContainer">Up<span class="highlight">Social</span></div>
    </div>

    <!-- Auth Container -->
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <div class="icon" id="cardIcon">⭐</div>
                <h1>Sign Up</h1>
                <p>Already have an account? <a href="login.html" style="color: #3CB371; text-decoration: none;">Sign in here</a></p>
            </div>

            <form onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="email" placeholder="Email address" required>
                </div>

                <div class="form-group">
                    <label>Username:</label>
                    <input type="text" id="username" placeholder="Username" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Country</label>
                        <select id="country">
                            <option>Nigeria</option>
                            <option>Ghana</option>
                            <option>Kenya</option>
                            <option>South Africa</option>
                            <option>USA</option>
                            <option>UK</option>
                            <option>Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Phone number</label>
                        <input type="tel" id="phone" placeholder="Enter your phone number">
                    </div>
                </div>

                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" id="password" placeholder="Password" required>
                </div>

                <div class="form-group">
                    <label>Password (again):</label>
                    <input type="password" id="confirmPassword" placeholder="Password (again)" required>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="agree" required>
                    <label for="agree">I agree to the <a href="#">terms & conditions</a></label>
                </div>

                <button type="submit" class="btn btn-primary">SIGN UP</button>
            </form>

            <div class="divider">
                <div class="divider-line"></div>
                <span class="divider-text">OR</span>
            </div>

            <button class="social-btn" onclick="alert('Google login coming soon!')">
                <span>🔵</span> Continue with Google
            </button>

            <div class="auth-link">
                Already have an account? <a href="login.html">Sign in here</a>
            </div>
        </div>
    </div>

    <script>
        function loadLogo() {
            const savedHeaderLogo = localStorage.getItem('upsocial_headerLogo');
            const savedIconLogo = localStorage.getItem('upsocial_iconLogo');
            
            // Load header logo
            if (savedHeaderLogo) {
                document.getElementById('logoContainer').innerHTML = '<img src="' + savedHeaderLogo + '" alt="UpSocial" style="height: 40px; width: auto;">';
            }
            
            // Load card icon logo
            if (savedIconLogo) {
                document.getElementById('cardIcon').innerHTML = '<img src="' + savedIconLogo + '" alt="Icon" style="height: 50px; width: auto;">';
            }
        }

        loadLogo();

        function handleSignup(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const phone = document.getElementById('phone').value;
            const country = document.getElementById('country').value;

            if (password !== confirmPassword) {
                alert('Passwords do not match!');
                return;
            }

            if (password.length < 6) {
                alert('Password must be at least 6 characters long!');
                return;
            }

            // Create user object
            const user = {
                email: email,
                username: username,
                password: password,
                phone: phone,
                country: country,
                joinDate: new Date().toLocaleDateString()
            };

            // Save user data
            localStorage.setItem('upsocial_user', JSON.stringify(user));
            
            // Initialize wallet for new user
            const wallet = {
                balance: 0,
                transactions: []
            };
            localStorage.setItem('upsocial_userWallet_' + email, JSON.stringify(wallet));
            
            // Initialize orders for new user
            const orders = [];
            localStorage.setItem('upsocial_userOrders_' + email, JSON.stringify(orders));
            
            // Set login status
            localStorage.setItem('upsocial_loggedIn', 'true');
            localStorage.setItem('upsocial_currentUser', email);

            // Redirect to dashboard
            setTimeout(() => {
                window.location.href = 'Dashboard.html';
            }, 500);
        }
    </script>
</body>
</html>
