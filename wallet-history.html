<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet History - UpSocial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body { 
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
            background: #ffffff; 
            color: #0a0e27;
            padding-bottom: 150px;
            display: flex;
            flex-direction: column;
        }
        
        /* Header */
        .header {
            background: white;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #f0f2f5;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        
        .header-back {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #f5f7fa;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: 0.3s;
        }
        
        .header-back:hover {
            background: #e8eef7;
        }
        
        .header-title {
            font-size: 18px;
            font-weight: 700;
            color: #0a0e27;
        }
        
        /* Main Content */
        main { 
            flex: 1;
            padding: 16px;
            max-width: 100%;
        }
        
        /* Wallet Summary Card */
        .wallet-summary {
            background: linear-gradient(135deg, #3CB371 0%, #2d9a5f 100%);
            border-radius: 18px;
            padding: 24px;
            margin-bottom: 28px;
            color: white;
            box-shadow: 0 8px 24px rgba(60, 179, 113, 0.2);
        }
        
        .summary-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }
        
        .summary-item {
            display: flex;
            flex-direction: column;
        }
        
        .summary-label {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }
        
        .summary-value {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        /* Filter Section */
        .filter-section {
            background: white;
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid #f0f2f5;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 10px 16px;
            border: 1.5px solid #e8eef7;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: 0.3s;
            color: #8892a8;
            font-family: 'Outfit', sans-serif;
        }
        
        .filter-btn.active {
            background: linear-gradient(135deg, #3CB371 0%, #2d9a5f 100%);
            color: white;
            border-color: #3CB371;
        }
        
        .filter-btn:hover {
            border-color: #3CB371;
            color: #3CB371;
        }
        
        /* Transactions Container */
        .transactions-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .transaction-card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #f0f2f5;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }
        
        .transaction-card:hover {
            box-shadow: 0 4px 12px rgba(10, 14, 39, 0.08);
            transform: translateY(-2px);
        }
        
        .transaction-left {
            display: flex;
            gap: 12px;
            align-items: center;
            flex: 1;
        }
        
        .transaction-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        
        .transaction-icon.deposit {
            background: #d1fae5;
            color: #065f46;
        }
        
        .transaction-icon.withdrawal {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .transaction-icon.service {
            background: #dbeafe;
            color: #0c2340;
        }
        
        .transaction-info {
            flex: 1;
        }
        
        .transaction-type {
            font-size: 13px;
            font-weight: 600;
            color: #0a0e27;
            margin-bottom: 4px;
        }
        
        .transaction-details {
            font-size: 11px;
            color: #8892a8;
            letter-spacing: 0.2px;
        }
        
        .transaction-right {
            text-align: right;
        }
        
        .transaction-amount {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        .transaction-amount.positive {
            color: #065f46;
        }
        
        .transaction-amount.negative {
            color: #991b1b;
        }
        
        .transaction-date {
            font-size: 11px;
            color: #8892a8;
        }
        
        .transaction-status {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            margin-top: 4px;
        }
        
        .status-completed {
            background: #d1fae5;
            color: #065f46;
        }
        
        .status-pending {
            background: #fef3c7;
            color: #92400e;
        }
        
        .status-failed {
            background: #fee2e2;
            color: #991b1b;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8892a8;
        }
        
        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        .empty-text {
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .empty-subtext {
            font-size: 12px;
            color: #c5cad4;
        }
        
        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #f0f2f5;
        }
        
        .pagination-btn {
            padding: 8px 12px;
            border: 1.5px solid #e8eef7;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            color: #8892a8;
            transition: 0.3s;
            font-family: 'Outfit', sans-serif;
        }
        
        .pagination-btn.active {
            background: #3CB371;
            color: white;
            border-color: #3CB371;
        }
        
        .pagination-btn:hover:not(.active) {
            border-color: #3CB371;
            color: #3CB371;
        }
        
        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Bottom Navigation */
        .bottom-nav{
            position:fixed;
            bottom:0;
            left:0;
            right:0;
            height:78px;
            background:#fff;
            display:flex;
            justify-content:space-around;
            align-items:center;
            border-top:1px solid #f1f1f1;
            box-shadow:0 -8px 30px rgba(0,0,0,.05);
            z-index:1000;
        }

        .nav-item{
            text-decoration:none;
            color:#9CA3AF;
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:5px;
            font-size:11px;
            font-weight:500;
            transition:.3s;
        }

        .nav-item i{
            font-size:20px;
        }

        .nav-item.active{
            color:#3CB371;
        }

        .nav-item.active i{
            background:rgba(60,179,113,.12);
            width:42px;
            height:42px;
            border-radius:12px;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .nav-item span{
            font-size:11px;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 14, 39, 0.6);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 28px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: 700;
            color: #0a0e27;
        }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            color: #c5cad4;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .modal-close:hover {
            color: #0a0e27;
        }
        
        .transaction-detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f0f2f5;
            font-size: 13px;
        }
        
        .transaction-detail-row:last-child {
            border-bottom: none;
        }
        
        .detail-label {
            color: #8892a8;
            font-weight: 500;
        }
        
        .detail-value {
            color: #0a0e27;
            font-weight: 600;
        }
        
        @media (max-width: 600px) {
            main { padding: 12px; }
            .summary-row { grid-template-columns: 1fr; gap: 16px; }
            .filter-section { flex-direction: column; }
            .transaction-card { flex-direction: column; gap: 12px; }
            .transaction-right { width: 100%; text-align: left; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <button class="header-back" onclick="goBack()">←</button>
        <h1 class="header-title">Wallet History</h1>
    </div>

    <!-- Main Content -->
    <main>
        <!-- Wallet Summary -->
        <div class="wallet-summary">
            <div class="summary-row">
                <div class="summary-item">
                    <div class="summary-label">Current Balance</div>
                    <div class="summary-value" id="currentBalance">₦0.00</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">Total Spent</div>
                    <div class="summary-value" id="totalSpent">₦0.00</div>
                </div>
            </div>
            <div class="summary-row">
                <div class="summary-item">
                    <div class="summary-label">Total Deposits</div>
                    <div class="summary-value" id="totalDeposits">₦0.00</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">Transaction Count</div>
                    <div class="summary-value" id="transactionCount">0</div>
                </div>
            </div>
        </div>

        <!-- Filter Section -->
        <div class="filter-section">
            <button class="filter-btn active" onclick="filterTransactions('all')">All Transactions</button>
            <button class="filter-btn" onclick="filterTransactions('deposit')">Deposits</button>
            <button class="filter-btn" onclick="filterTransactions('service')">Services</button>
            <button class="filter-btn" onclick="filterTransactions('completed')">Completed</button>
        </div>

        <!-- Transactions Container -->
        <div class="transactions-container" id="transactionsContainer">
            <div class="empty-state">
                <div class="empty-icon">⏳</div>
                <div class="empty-text">Loading transactions...</div>
            </div>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination"></div>

        <!-- Empty State -->
        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-icon">💳</div>
            <div class="empty-text">No transactions yet</div>
            <div class="empty-subtext">Your transactions will appear here</div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <i class="fas fa-house"></i>
            <span>Home</span>
        </a>
        <a href="my-orders.html" class="nav-item">
            <i class="fas fa-layer-group"></i>
            <span>Orders</span>
        </a>
        <a href="new-order.html" class="nav-item">
            <i class="fas fa-bag-shopping"></i>
            <span>New-Orders</span>
        </a>
        <a href="profile.html" class="nav-item">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </a>
    </div>

    <!-- Transaction Detail Modal -->
    <div class="modal" id="transactionModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Transaction Details</h3>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        let allTransactions = [];
        let filteredTransactions = [];
        let currentFilter = 'all';
        let currentPage = 1;
        const transactionsPerPage = 10;

        // Initialize
        window.addEventListener('load', function() {
            checkLogin();
            loadWalletHistory();
        });

        function checkLogin() {
            const isLoggedIn = localStorage.getItem('upsocial_loggedIn');
            if (!isLoggedIn || isLoggedIn === 'false') {
                window.location.href = 'login.html';
                return;
            }
        }

        function loadWalletHistory() {
            const userEmail = localStorage.getItem('upsocial_currentUser');
            const walletData = localStorage.getItem('upsocial_userWallet_' + userEmail);
            const wallet = walletData ? JSON.parse(walletData) : { balance: 0, transactions: [] };
            
            const ordersData = localStorage.getItem('upsocial_userOrders_' + userEmail);
            const orders = ordersData ? JSON.parse(ordersData) : [];

            // Build transactions array
            allTransactions = [];

            // Add wallet transactions (deposits)
            if (wallet.transactions) {
                wallet.transactions.forEach(trans => {
                    allTransactions.push({
                        id: 'TXN_' + Math.random().toString(36).substr(2, 9).toUpperCase(),
                        type: 'deposit',
                        description: trans.type || 'Wallet Deposit',
                        amount: trans.amount,
                        date: trans.date,
                        time: trans.time || new Date().toLocaleTimeString(),
                        status: trans.status || 'completed',
                        method: trans.method || 'Korapay',
                        reference: trans.reference || 'N/A'
                    });
                });
            }

            // Add order transactions (service purchases)
            orders.forEach(order => {
                allTransactions.push({
                    id: order.id,
                    type: 'service',
                    description: `${order.service} - ${order.platform}`,
                    amount: -order.price,
                    quantity: order.quantity,
                    date: order.date,
                    time: order.time || 'N/A',
                    status: order.status || 'pending',
                    platform: order.platform,
                    target: order.target
                });
            });

            // Sort by date (newest first)
            allTransactions.sort((a, b) => new Date(b.date) - new Date(a.date));

            // Update summary
            updateSummary(wallet, orders);

            // Display transactions
            filterTransactions('all');
        }

        function updateSummary(wallet, orders) {
            const currentBalance = wallet.balance || 0;
            const totalSpent = orders.reduce((sum, o) => sum + (o.price || 0), 0);
            const totalDeposits = (wallet.transactions || []).reduce((sum, t) => sum + (t.amount || 0), 0);

            document.getElementById('currentBalance').textContent = '₦' + currentBalance.toFixed(2);
            document.getElementById('totalSpent').textContent = '₦' + totalSpent.toFixed(2);
            document.getElementById('totalDeposits').textContent = '₦' + totalDeposits.toFixed(2);
            document.getElementById('transactionCount').textContent = allTransactions.length;
        }

        function filterTransactions(filter) {
            currentFilter = filter;
            currentPage = 1;

            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // Filter transactions
            if (filter === 'all') {
                filteredTransactions = allTransactions;
            } else if (filter === 'deposit') {
                filteredTransactions = allTransactions.filter(t => t.type === 'deposit');
            } else if (filter === 'service') {
                filteredTransactions = allTransactions.filter(t => t.type === 'service');
            } else if (filter === 'completed') {
                filteredTransactions = allTransactions.filter(t => t.status === 'completed');
            }

            // Display filtered transactions
            displayTransactions();
        }

        function displayTransactions() {
            const container = document.getElementById('transactionsContainer');
            const emptyState = document.getElementById('emptyState');

            if (filteredTransactions.length === 0) {
                container.innerHTML = '';
                emptyState.style.display = 'block';
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            emptyState.style.display = 'none';

            // Pagination
            const startIndex = (currentPage - 1) * transactionsPerPage;
            const endIndex = startIndex + transactionsPerPage;
            const pageTransactions = filteredTransactions.slice(startIndex, endIndex);

            // Display transactions
            container.innerHTML = pageTransactions.map(trans => `
                <div class="transaction-card" onclick="openTransactionDetail(${filteredTransactions.indexOf(trans)})">
                    <div class="transaction-left">
                        <div class="transaction-icon ${trans.type}">
                            ${trans.type === 'deposit' ? '⬇️' : '⬆️'}
                        </div>
                        <div class="transaction-info">
                            <div class="transaction-type">${trans.description}</div>
                            <div class="transaction-details">
                                ${trans.date} ${trans.time}
                                <span class="transaction-status status-${trans.status}">
                                    ${trans.status.charAt(0).toUpperCase() + trans.status.slice(1)}
                                </span>
                            </div>
                        </div>
                    </div>
                    <div class="transaction-right">
                        <div class="transaction-amount ${trans.amount >= 0 ? 'positive' : 'negative'}">
                            ${trans.amount >= 0 ? '+' : ''}₦${Math.abs(trans.amount).toFixed(2)}
                        </div>
                    </div>
                </div>
            `).join('');

            // Display pagination
            displayPagination();
        }

        function displayPagination() {
            const totalPages = Math.ceil(filteredTransactions.length / transactionsPerPage);
            const paginationContainer = document.getElementById('pagination');

            if (totalPages <= 1) {
                paginationContainer.innerHTML = '';
                return;
            }

            let paginationHTML = '';

            // Previous button
            paginationHTML += `<button class="pagination-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>← Prev</button>`;

            // Page numbers
            for (let i = 1; i <= totalPages; i++) {
                if (i === currentPage) {
                    paginationHTML += `<button class="pagination-btn active">${i}</button>`;
                } else if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                    paginationHTML += `<button class="pagination-btn" onclick="goToPage(${i})">${i}</button>`;
                } else if (i === currentPage - 2 || i === currentPage + 2) {
                    paginationHTML += `<button class="pagination-btn" disabled>...</button>`;
                }
            }

            // Next button
            paginationHTML += `<button class="pagination-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Next →</button>`;

            paginationContainer.innerHTML = paginationHTML;
        }

        function goToPage(page) {
            const totalPages = Math.ceil(filteredTransactions.length / transactionsPerPage);
            if (page >= 1 && page <= totalPages) {
                currentPage = page;
                displayTransactions();
                window.scrollTo(0, 0);
            }
        }

        function openTransactionDetail(index) {
            const trans = filteredTransactions[index];
            let detailHTML = `
                <div class="transaction-detail-row">
                    <span class="detail-label">Transaction ID</span>
                    <span class="detail-value">${trans.id}</span>
                </div>
                <div class="transaction-detail-row">
                    <span class="detail-label">Type</span>
                    <span class="detail-value">${trans.type === 'deposit' ? 'Deposit' : 'Service Purchase'}</span>
                </div>
                <div class="transaction-detail-row">
                    <span class="detail-label">Description</span>
                    <span class="detail-value">${trans.description}</span>
                </div>
                <div class="transaction-detail-row">
                    <span class="detail-label">Amount</span>
                    <span class="detail-value">${trans.amount >= 0 ? '+' : ''}₦${Math.abs(trans.amount).toFixed(2)}</span>
                </div>
                <div class="transaction-detail-row">
                    <span class="detail-label">Date</span>
                    <span class="detail-value">${trans.date}</span>
                </div>
                <div class="transaction-detail-row">
                    <span class="detail-label">Time</span>
                    <span class="detail-value">${trans.time}</span>
                </div>
                <div class="transaction-detail-row">
                    <span class="detail-label">Status</span>
                    <span class="detail-value" style="color: ${trans.status === 'completed' ? '#065f46' : '#92400e'};">
                        ${trans.status.charAt(0).toUpperCase() + trans.status.slice(1)}
                    </span>
                </div>
            `;

            if (trans.type === 'deposit' && trans.reference) {
                detailHTML += `
                    <div class="transaction-detail-row">
                        <span class="detail-label">Reference</span>
                        <span class="detail-value" style="font-size: 11px; word-break: break-all;">${trans.reference}</span>
                    </div>
                `;
            }

            if (trans.type === 'service') {
                detailHTML += `
                    <div class="transaction-detail-row">
                        <span class="detail-label">Platform</span>
                        <span class="detail-value">${trans.platform || 'N/A'}</span>
                    </div>
                    <div class="transaction-detail-row">
                        <span class="detail-label">Quantity</span>
                        <span class="detail-value">${trans.quantity || 'N/A'}</span>
                    </div>
                `;
            }

            document.getElementById('modalBody').innerHTML = detailHTML;
            document.getElementById('transactionModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('transactionModal').classList.remove('active');
        }

        function goBack() {
            window.history.back();
        }

        // Close modal on background click
        document.getElementById('transactionModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
